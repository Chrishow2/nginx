
services:
  nginx:
    build: .
    container_name: nginx_host
    network_mode: host
    volumes:
      - ./conf.d:/etc/nginx/conf.d:rw
      - letsencrypt_data:/etc/letsencrypt:rw
      - acme_webroot:/var/www/certbot:rw
    restart: unless-stopped

  vhost-ui:
    build: ./vhost-ui
    container_name: nginx_vhost_ui
    ports:
      - "127.0.0.1:81:8080"
    environment:
      NGINX_CONTAINER: nginx_host
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    volumes:
      - ./conf.d:/etc/nginx/conf.d:rw
      - letsencrypt_data:/etc/letsencrypt:rw
      - acme_webroot:/var/www/certbot:rw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  letsencrypt_data:
  acme_webroot:
